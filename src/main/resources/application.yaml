server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/pirate_team
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cloud:
    openfeign:
      okhttp:
        enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: uClrcaKGIPFVMfZfoyJMI5ipcDgBAQXRbSmHzxFfLQi
  accessTokenExpirationTime: 86400000
  refreshTokenExpirationTime: 2592000000